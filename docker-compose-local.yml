version: "3.9"

networks:
  panda-dev-net:
    name: panda-dev-net
    driver: bridge

services:
  panda-dev-api:
    container_name: panda-dev-api
    restart: unless-stopped
    healthcheck:
      test: wget http://localhost:50000/ || exit 1
      interval: 1s
      timeout: 10s
      retries: 20
      start_period: 3s
    depends_on:
      panda-dev-neo4j:
        condition: service_healthy
    environment:
      - API_JWT_SECRET=createstrongsecretplease
      - API_PORT=50000
      - BCRYPT_SALT_ROUNDS=12
      - NEO4J_HOST=panda-dev-neo4j
      - NEO4J_PORT=7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=elipanda2022
      - NEO4J_SCHEMA=bolt://
      - API_INTEGRATION_B_OKBASE_GET_EMPLOYEES_URL=https://elieric.okbase.cz/okbase/service/rest/sestava/run
      - API_INTEGRATION_B_OKBASE_API_KEY=${API_INTEGRATION_B_OKBASE_API_KEY}
    build:
      context: ./
      dockerfile: Dockerfile
      labels:
        - panda-dev-api
    networks:
      - panda-dev-net
    ports:
      - "50000:50000"
    platform: linux/amd64
  panda-dev-neo4j:
    container_name: panda-dev-neo4j
    image: neo4j:5.26.0-community
    # user: "1020:1020"
    restart: unless-stopped
    healthcheck:
      test: wget http://localhost:7474 || exit 1
      interval: 1s
      timeout: 10s
      retries: 20
      start_period: 3s
    environment:
      - NEO4J_AUTH=neo4j/elipanda2022
      # Neo4j 5: NEO4J_PLUGINS installs APOC Core; for APOC Extended procedures
      # (apoc.convert.*, apoc.text.join, apoc.map.*, apoc.do.*, etc.) download the
      # apoc-5.x.x-extended.jar from https://github.com/neo4j/apoc/releases and
      # place it in ./db/neo4j/dev-instance/plugins/
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=true
      - NEO4J_dbms_cypher_lenient__create__relationship=true
      - NEO4J_server_directories_import=import
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_db_temporal_timezone=Europe/Prague
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
    volumes:
      - "./db/neo4j/dev-instance/data:/data"
      - "./db/neo4j/dev-instance/logs:/logs"
      - "./db/neo4j/dev-instance/plugins:/plugins"
      - "./db/neo4j/dev-instance/conf:/conf"
      - "./db/neo4j/dev-instance/import:/var/lib/neo4j/import"
    networks:
      - panda-dev-net
    ports:
      - "7470:7474"
      - "7680:7687"
    platform: linux/amd64
